services:
  db:
    image: postgres:16-alpine
    container_name: lazaro-db
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb.sh:/docker-entrypoint-initdb.d/00_initdb.sh:ro
      - ./sql:/docker-entrypoint-initdb.d/sql:ro

volumes:
  pgdata:
